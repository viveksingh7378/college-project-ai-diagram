version: "3.9"

# ─────────────────────────────────────────────────────────────
#  AI Diagram Agent — Merged fullstack deployment
#  Services:
#    - client   (React + Vite, served by nginx on :80)
#    - server   (Node.js + Express on :5000)
#    - mongo    (MongoDB 7 on :27017)
#
#  Usage:
#    docker compose up -d --build
#    docker compose logs -f
#    docker compose down
# ─────────────────────────────────────────────────────────────

services:

  # ── Frontend (React + Vite served via nginx) ──────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    image: vivek7378/college-ai-diagram-client:latest
    container_name: college-ai-diagram-client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - ai-net

  # ── Backend (Node.js + Express) ───────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: vivek7378/college-ai-diagram-server:latest
    container_name: college-ai-diagram-server
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/ai-diagram-agent
      CLIENT_URL: http://localhost
      JWT_SECRET: ${JWT_SECRET:-change_me_in_env}
      # Groq is the primary AI provider (native JSON mode → no syntax errors)
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      PLANTUML_SERVER: ${PLANTUML_SERVER:-https://www.plantuml.com/plantuml/png}
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - ai-net

  # ── MongoDB ───────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: college-ai-diagram-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ai-net

volumes:
  mongo_data:

networks:
  ai-net:
    driver: bridge
