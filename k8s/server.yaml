apiVersion: v1
kind: Secret
metadata:
  name: server-secrets
  namespace: ai-diagram
type: Opaque
stringData:
  # Replace these at deploy time (kubectl create secret ... --dry-run=client -o yaml | kubectl apply -f -)
  JWT_SECRET: "change_me_to_a_long_random_string"
  # Primary AI provider — Groq (native JSON mode → no syntax errors in responses)
  GROQ_API_KEY: ""
  # Optional fallbacks
  GEMINI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  namespace: ai-diagram
  labels: { app: server }
spec:
  replicas: 2
  selector:
    matchLabels: { app: server }
  template:
    metadata:
      labels: { app: server }
    spec:
      containers:
        - name: server
          image: vivek7378/college-ai-diagram-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "5000"
            - name: MONGODB_URI
              value: "mongodb://mongo:27017/ai-diagram-agent"
            - name: CLIENT_URL
              value: "http://client"
            - name: PLANTUML_SERVER
              value: "https://www.plantuml.com/plantuml/png"
          envFrom:
            - secretRef:
                name: server-secrets
          readinessProbe:
            httpGet: { path: /api/health, port: 5000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/health, port: 5000 }
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: server
  namespace: ai-diagram
spec:
  selector: { app: server }
  ports:
    - port: 5000
      targetPort: 5000
  type: ClusterIP
